services:
  postgres:
    image: postgres:16-alpine
    container_name: nightlife-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nightlife
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - nightlife_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nightlife"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nightlife_postgres_data:
