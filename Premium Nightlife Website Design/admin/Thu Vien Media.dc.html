<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#0c0c0f;}
  ::selection{background:rgba(212,178,106,.3);color:#fff;}
  .scw::-webkit-scrollbar{width:9px;height:9px;}
  .scw::-webkit-scrollbar-thumb{background:rgba(212,178,106,.2);border-radius:9px;}
  .scw::-webkit-scrollbar-track{background:transparent;}
  .scw{scrollbar-width:thin;scrollbar-color:rgba(212,178,106,.25) transparent;}
  @keyframes vpulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  @keyframes vrise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
</style>
</helmet>

<div style="display:flex;min-height:100vh;background:#0c0c0f;color:#f3f0ea;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;">
  <dc-import name="Admin Sidebar" active="media" style="width:250px;flex:none;position:sticky;top:0;height:100vh;" hint-size="250px,100vh"></dc-import>

  <div style="flex:1;min-width:0;display:flex;flex-direction:column;">
    <dc-import name="Admin Topbar" title="Thư viện media" page-en="Media" style="position:sticky;top:0;z-index:30;" hint-size="100%,68px"></dc-import>

    <div class="scw" style="flex:1;overflow:auto;">
      <div data-screen-label="Admin · Media" style="padding:22px 26px 44px;">
        <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px;">
          <div style="display:flex;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:11px;padding:3px;gap:2px;">
            <span onClick="{{ mdAll }}" style="{{ mdTabAll }}">Tất cả</span>
            <span onClick="{{ mdImg }}" style="{{ mdTabImg }}">Ảnh</span>
            <span onClick="{{ mdVid }}" style="{{ mdTabVid }}">Video</span>
          </div>
          <span style="font-size:11.5px;color:#8c8679;">1.284 file · 3.2 GB</span>
          <div style="flex:1;"></div>
          <span onClick="{{ mdUpload }}" style="display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;color:#241a0a;background:linear-gradient(135deg,#f4e3b4,#d4b26a 55%,#b6924a);padding:10px 17px;border-radius:10px;cursor:pointer;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M7 9l5-5 5 5M5 20h14"/></svg>Tải lên</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:14px;">
          <div onClick="{{ mdUpload }}" style="aspect-ratio:1;border-radius:13px;border:1.5px dashed rgba(212,178,106,.35);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;color:#8c8679;cursor:pointer;" style-hover="border-color:rgba(212,178,106,.6);background:rgba(212,178,106,.04);"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M7 9l5-5 5 5M5 20h14"/></svg><span style="font-size:10px;">Tải lên</span></div>
          <sc-for list="{{ mdItems }}" as="m" hint-placeholder-count="17">
            <div style="aspect-ratio:1;border-radius:13px;background:{{ m.img }};position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.06);" style-hover="border-color:rgba(212,178,106,.35);">
              <sc-if value="{{ m.isVid }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:32px;height:32px;border-radius:50%;background:rgba(12,12,15,.5);border:1px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;color:#fff;"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></span></sc-if>
              <span style="position:absolute;left:8px;bottom:8px;font-size:8.5px;font-weight:600;color:#f3f0ea;background:rgba(12,12,15,.6);padding:2px 7px;border-radius:6px;">{{ m.tag }}</span>
            </div>
          </sc-for>
        </div>
      </div>
    </div>
  </div>

  <sc-if value="{{ upOpen }}" hint-placeholder-val="{{ false }}">
    <div onClick="{{ upClose }}" style="position:fixed;inset:0;z-index:80;background:rgba(6,6,9,.72);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;padding:24px;">
      <div onClick="{{ upStop }}" style="width:640px;max-width:94vw;max-height:92vh;display:flex;flex-direction:column;background:#141319;border:1px solid rgba(255,255,255,.1);border-radius:18px;box-shadow:0 40px 90px -30px rgba(0,0,0,.9);animation:vrise .25s ease;overflow:hidden;">
        <div style="display:flex;align-items:center;gap:14px;padding:16px 24px;border-bottom:1px solid rgba(255,255,255,.07);flex:none;">
          <div style="flex:1;">
            <div style="font-size:9.5px;font-weight:700;letter-spacing:1.4px;color:#8c8679;text-transform:uppercase;">Thư viện media</div>
            <div style="font-size:17px;font-weight:700;color:#f3f0ea;margin-top:3px;">Tải media lên</div>
          </div>
          <span onClick="{{ upClose }}" style="width:32px;height:32px;border-radius:9px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;color:#9b958a;cursor:pointer;" style-hover="color:#f3f0ea;border-color:rgba(255,255,255,.2);"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></span>
        </div>
        <div class="scw" style="flex:1;overflow-y:auto;padding:20px 24px 24px;display:flex;flex-direction:column;gap:18px;">
          <div style="position:relative;height:130px;border-radius:13px;border:1.5px dashed rgba(212,178,106,.45);background:rgba(212,178,106,.03);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#b99a55" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M7 9l5-5 5 5M5 20h14"/></svg>
            <span style="font-size:13px;font-weight:600;color:#cbb884;">Bấm hoặc kéo thả file vào đây</span>
            <span style="font-size:10.5px;color:#57534b;">PNG / JPG / MP4 · tối đa 50 MB/file · chọn được nhiều file</span>
            <input type="file" accept="image/*,video/*" multiple="{{ true }}" onChange="{{ upPick }}" title="Chọn file" style="position:absolute;inset:0;opacity:0;cursor:pointer;">
          </div>
          <sc-if value="{{ upHasFiles }}" hint-placeholder-val="{{ false }}">
            <div>
              <div style="font-size:10px;font-weight:700;letter-spacing:.9px;color:#8c8679;text-transform:uppercase;margin-bottom:8px;">Đã chọn {{ upCount }} file</div>
              <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:9px;">
                <sc-for list="{{ upFiles }}" as="f" hint-placeholder-count="3">
                  <div style="aspect-ratio:1;border-radius:10px;background:{{ f.img }};position:relative;border:1px solid rgba(255,255,255,.08);overflow:hidden;">
                    <sc-if value="{{ f.isVid }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:26px;height:26px;border-radius:50%;background:rgba(12,12,15,.55);border:1px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;color:#fff;"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></span></sc-if>
                    <span onClick="{{ f.rm }}" title="Bỏ file này" style="position:absolute;top:5px;right:5px;width:20px;height:20px;border-radius:6px;background:rgba(12,12,15,.72);display:flex;align-items:center;justify-content:center;color:#c5c0b6;cursor:pointer;" style-hover="color:#e88b99;"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></span>
                  </div>
                </sc-for>
              </div>
            </div>
          </sc-if>
          <div>
            <div style="font-size:10px;font-weight:700;letter-spacing:.9px;color:#8c8679;text-transform:uppercase;margin-bottom:8px;">Gắn vào quán (tùy chọn)</div>
            <input value="{{ upVenue }}" onInput="{{ upVenueSet }}" placeholder="VD: Club Lumière — để trống nếu là media chung" style="width:100%;background:rgba(12,12,15,.55);border:1px solid rgba(255,255,255,.1);border-radius:11px;padding:12px 15px;color:#f3f0ea;font-size:13px;font-family:inherit;outline:none;" style-focus="border-color:rgba(212,178,106,.55);">
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;padding:14px 24px;border-top:1px solid rgba(255,255,255,.07);flex:none;background:rgba(12,12,15,.35);">
          <span style="flex:1;"></span>
          <span onClick="{{ upClose }}" style="font-size:12.5px;font-weight:600;color:#9b958a;padding:10px 16px;border-radius:10px;cursor:pointer;" style-hover="color:#f3f0ea;">Hủy</span>
          <span onClick="{{ upSave }}" style="{{ upSaveStyle }}">{{ upBtnLabel }}</span>
        </div>
      </div>
    </div>
  </sc-if>

  <sc-if value="{{ toast }}" hint-placeholder-val="{{ false }}">
    <div style="position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:90;display:flex;align-items:center;gap:10px;background:#17161c;border:1px solid rgba(212,178,106,.3);color:#f3f0ea;font-size:13.5px;font-weight:500;padding:13px 22px;border-radius:12px;box-shadow:0 20px 44px -18px rgba(0,0,0,.85);animation:vrise .25s ease;">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#7fd3a2" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>{{ toast }}
    </div>
  </sc-if>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:940}}">
class Component extends DCLogic {
  state = { toast:null };
  showToast(m){ this.setState({ toast:m }); clearTimeout(this._t); this._t=setTimeout(()=>this.setState({toast:null}),2600); }

  renderVals(){
    const S=this.state, o={ toast:S.toast };
    const mf=S.mediaFilter||'all';
    const mdtab=(a)=>'font-size:12px;padding:7px 13px;border-radius:8px;cursor:pointer;'+(a?'color:#241a0a;background:linear-gradient(135deg,#f0dda8,#d4b26a);font-weight:600;':'color:#9b958a;');
    o.mdTabAll=mdtab(mf==='all'); o.mdTabImg=mdtab(mf==='img'); o.mdTabVid=mdtab(mf==='vid');
    o.mdAll=()=>this.setState({mediaFilter:'all'}); o.mdImg=()=>this.setState({mediaFilter:'img'}); o.mdVid=()=>this.setState({mediaFilter:'vid'});
    o.mdUpload=()=>this.setState({up:{files:[],venue:''}});
    const grads=['#3a2f22,#1a1510','#2a2233,#161020','#22282e,#12181e','#2e2226,#180f14','#26302a,#141a16','#332a20,#181209'];
    const MEDIA=[]; for(let i=0;i<17;i++){ const vid=i%4===2; MEDIA.push({img:'linear-gradient(135deg,'+grads[i%grads.length]+')',isVid:vid,tag:vid?'Video':'Ảnh',type:vid?'vid':'img'}); }
    o.mdItems = (S.mediaExtra||[]).concat(MEDIA).filter(m=> mf==='all' || m.type===mf);
    const up=S.up;
    o.upOpen=!!up;
    if(up){
      o.upStop=(e)=>e.stopPropagation(); o.upClose=()=>this.setState({up:null});
      o.upVenue=up.venue; o.upVenueSet=(e)=>this.setState({up:{...this.state.up,venue:e.target.value}});
      o.upPick=(e)=>{
        const fs=Array.from(e.target.files||[]); if(!fs.length) return;
        const vids=fs.filter(f=>!f.type.startsWith('image/')).map(f=>({img:'linear-gradient(135deg,#22282e,#12181e)',isVid:true,name:f.name}));
        if(vids.length){ const u=this.state.up; this.setState({up:{...u,files:u.files.concat(vids)}}); }
        fs.filter(f=>f.type.startsWith('image/')).forEach(f=>{
          const r=new FileReader();
          r.onload=()=>{ const u=this.state.up; if(!u) return; this.setState({up:{...u,files:u.files.concat([{img:'url('+r.result+') center/cover no-repeat',isVid:false,name:f.name}])}}); };
          r.readAsDataURL(f);
        });
        e.target.value='';
      };
      o.upFiles=up.files.map((f,i)=>({...f,rm:()=>{ const u=this.state.up; this.setState({up:{...u,files:u.files.filter((x,j)=>j!==i)}}); }}));
      o.upHasFiles=up.files.length>0;
      o.upCount=up.files.length;
      o.upBtnLabel=up.files.length?('Tải lên '+up.files.length+' file'):'Tải lên';
      o.upSaveStyle='display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;color:#241a0a;background:linear-gradient(135deg,#f4e3b4,#d4b26a 55%,#b6924a);padding:10px 19px;border-radius:10px;cursor:pointer;'+(up.files.length?'':'opacity:.45;');
      o.upSave=()=>{
        if(!up.files.length){ this.showToast('Chọn file để tải lên'); return; }
        const add=up.files.map(f=>({img:f.img,isVid:f.isVid,tag:f.isVid?'Video':'Ảnh',type:f.isVid?'vid':'img'}));
        this.setState({mediaExtra:add.concat(S.mediaExtra||[]),up:null});
        this.showToast('Đã tải lên '+add.length+' file'+(up.venue?(' · gắn vào '+up.venue):''));
      };
    }
    return o;
  }
}

</script>
</body>
</html>
