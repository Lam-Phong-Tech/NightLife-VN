<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#0c0c0f;}
  ::selection{background:rgba(212,178,106,.3);color:#fff;}
  .scw::-webkit-scrollbar{width:9px;height:9px;}
  .scw::-webkit-scrollbar-thumb{background:rgba(212,178,106,.2);border-radius:9px;}
  .scw::-webkit-scrollbar-track{background:transparent;}
  .scw{scrollbar-width:thin;scrollbar-color:rgba(212,178,106,.25) transparent;}
  @keyframes vpulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  @keyframes vrise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
</style>
</helmet>

<div style="display:flex;min-height:100vh;background:#0c0c0f;color:#f3f0ea;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;">
  <dc-import name="Admin Sidebar" active="media" style="width:250px;flex:none;position:sticky;top:0;height:100vh;" hint-size="250px,100vh"></dc-import>

  <div style="flex:1;min-width:0;display:flex;flex-direction:column;">
    <dc-import name="Admin Topbar" title="Thư viện media" page-en="Media" style="position:sticky;top:0;z-index:30;" hint-size="100%,68px"></dc-import>

    <div class="scw" style="flex:1;overflow:auto;">
      <div data-screen-label="Admin · Media" style="padding:22px 26px 44px;">
        <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px;">
          <div style="display:flex;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:11px;padding:3px;gap:2px;">
            <span onClick="{{ mdAll }}" style="{{ mdTabAll }}">Tất cả</span>
            <span onClick="{{ mdImg }}" style="{{ mdTabImg }}">Ảnh</span>
            <span onClick="{{ mdVid }}" style="{{ mdTabVid }}">Video</span>
          </div>
          <span style="font-size:11.5px;color:#8c8679;">1.284 file · 3.2 GB</span>
          <div style="flex:1;"></div>
          <span onClick="{{ mdUpload }}" style="display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;color:#241a0a;background:linear-gradient(135deg,#f4e3b4,#d4b26a 55%,#b6924a);padding:10px 17px;border-radius:10px;cursor:pointer;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M7 9l5-5 5 5M5 20h14"/></svg>Tải lên</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:14px;">
          <div style="aspect-ratio:1;border-radius:13px;border:1.5px dashed rgba(212,178,106,.35);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;color:#8c8679;cursor:pointer;" style-hover="border-color:rgba(212,178,106,.6);background:rgba(212,178,106,.04);"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M7 9l5-5 5 5M5 20h14"/></svg><span style="font-size:10px;">Tải lên</span></div>
          <sc-for list="{{ mdItems }}" as="m" hint-placeholder-count="17">
            <div style="aspect-ratio:1;border-radius:13px;background:{{ m.img }};position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.06);" style-hover="border-color:rgba(212,178,106,.35);">
              <sc-if value="{{ m.isVid }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:32px;height:32px;border-radius:50%;background:rgba(12,12,15,.5);border:1px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;color:#fff;"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></span></sc-if>
              <span style="position:absolute;left:8px;bottom:8px;font-size:8.5px;font-weight:600;color:#f3f0ea;background:rgba(12,12,15,.6);padding:2px 7px;border-radius:6px;">{{ m.tag }}</span>
            </div>
          </sc-for>
        </div>
      </div>
    </div>
  </div>

  <sc-if value="{{ toast }}" hint-placeholder-val="{{ false }}">
    <div style="position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:90;display:flex;align-items:center;gap:10px;background:#17161c;border:1px solid rgba(212,178,106,.3);color:#f3f0ea;font-size:13.5px;font-weight:500;padding:13px 22px;border-radius:12px;box-shadow:0 20px 44px -18px rgba(0,0,0,.85);animation:vrise .25s ease;">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#7fd3a2" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>{{ toast }}
    </div>
  </sc-if>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:940}}">
class Component extends DCLogic {
  state = { toast:null };
  showToast(m){ this.setState({ toast:m }); clearTimeout(this._t); this._t=setTimeout(()=>this.setState({toast:null}),2600); }

  renderVals(){
    const S=this.state, o={ toast:S.toast };
    const mf=S.mediaFilter||'all';
    const mdtab=(a)=>'font-size:12px;padding:7px 13px;border-radius:8px;cursor:pointer;'+(a?'color:#241a0a;background:linear-gradient(135deg,#f0dda8,#d4b26a);font-weight:600;':'color:#9b958a;');
    o.mdTabAll=mdtab(mf==='all'); o.mdTabImg=mdtab(mf==='img'); o.mdTabVid=mdtab(mf==='vid');
    o.mdAll=()=>this.setState({mediaFilter:'all'}); o.mdImg=()=>this.setState({mediaFilter:'img'}); o.mdVid=()=>this.setState({mediaFilter:'vid'});
    o.mdUpload=()=>this.showToast('Mở hộp thoại tải media lên');
    const grads=['#3a2f22,#1a1510','#2a2233,#161020','#22282e,#12181e','#2e2226,#180f14','#26302a,#141a16','#332a20,#181209'];
    const MEDIA=[]; for(let i=0;i<17;i++){ const vid=i%4===2; MEDIA.push({img:'linear-gradient(135deg,'+grads[i%grads.length]+')',isVid:vid,tag:vid?'Video':'Ảnh',type:vid?'vid':'img'}); }
    o.mdItems = MEDIA.filter(m=> mf==='all' || m.type===mf);
    return o;
  }
}

</script>
</body>
</html>
