<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../shared.js"></script>
<script src="../../support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0e0d12;}
  a{text-decoration:none;color:inherit;}
</style>
</helmet>


  <div style="margin:0 auto;width:100%;max-width:480px;background:#0e0d12;min-height:100vh;display:flex;flex-direction:column;padding-bottom:20px;box-shadow:0 0 20px rgba(0,0,0,.05);color:#f3f0ea;font-family:'Inter',sans-serif;position:relative;">
    

    <div style="padding:16px 18px 6px;background:#0c0c0f;">
      <div style="position:relative;overflow:hidden;background:linear-gradient(135deg,#f4e3b4 0%,#d4b26a 48%,#a87c3c 100%);border-radius:18px;padding:18px;color:#241a0a;box-shadow:0 16px 34px -16px rgba(168,124,60,.6);">
        <div style="position:absolute;top:-30px;right:-20px;width:140px;height:140px;background:radial-gradient(circle,rgba(255,255,255,.4),transparent 70%);"></div>
        <div style="position:relative;display:flex;align-items:center;gap:12px;"><span style="width:50px;height:50px;border-radius:50%;background:url('https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=200&q=70') center/cover;border:2px solid rgba(36,26,10,.25);"></span><div style="flex:1;"><div style="font-size:16px;font-weight:800;">{{ name }}</div><div style="font-size:11.5px;color:rgba(36,26,10,.7);">{{ phone }}</div></div><span style="font-size:10px;font-weight:700;background:#241a0a;color:#f0dda8;border-radius:9px;padding:4px 9px;">Hạng {{ tier }}</span></div>
        <div style="position:relative;margin-top:14px;background:rgba(36,26,10,.12);border-radius:11px;padding:12px;"><div style="display:flex;justify-content:space-between;font-size:12px;"><span style="color:rgba(36,26,10,.72);">Điểm thưởng</span><span style="font-weight:800;">{{ points }}</span></div><div style="height:6px;background:rgba(36,26,10,.18);border-radius:3px;margin-top:8px;"><div style="width:62%;height:100%;background:#241a0a;border-radius:3px;"></div></div><div style="font-size:10.5px;color:rgba(36,26,10,.72);margin-top:6px;">Cần thêm {{ need }} điểm lên hạng {{ nextTier }}</div></div>
      </div>
    </div>

    <div style="padding:0 18px;display:flex;flex-direction:column;">
      <sc-for list="{{ menu }}" as="m" hint-placeholder-count="5">
        <a href="{{ m.href }}" style="display:flex;align-items:center;gap:12px;padding:13px 4px;border-bottom:1px solid rgba(255,255,255,.08);"><span style="width:36px;height:36px;border-radius:10px;background:rgba(212,178,106,.13);display:flex;align-items:center;justify-content:center;flex:none;"><img src="{{ m.icon }}" style="width:18px;height:18px;" alt=""></span><div style="flex:1;"><div style="font-size:13.5px;font-weight:600;">{{ m.title }}</div><div style="font-size:10.5px;color:#8c8679;margin-top:1px;">{{ m.sub }}</div></div><img src="https://img.icons8.com/ios/100/6F6B62/chevron-right.png" style="width:15px;height:15px;" alt=""></a>
      </sc-for>
      <a href="dang-nhap.html" style="display:flex;align-items:center;gap:12px;padding:14px 4px;color:#e89aa0;"><span style="width:36px;height:36px;border-radius:10px;background:rgba(190,70,84,.16);display:flex;align-items:center;justify-content:center;flex:none;"><img src="https://img.icons8.com/ios/100/B03A4A/exit.png" style="width:18px;height:18px;" alt=""></span><div style="flex:1;font-size:13.5px;font-weight:600;">Đăng xuất</div></a>
    </div>

    <div style="position:sticky;bottom:0;z-index:99;margin-top:auto;height:66px;background:rgba(8,8,11,.92);backdrop-filter:blur(10px);border-top:1px solid rgba(212,178,106,.14);display:flex;align-items:center;justify-content:space-around;padding-bottom:6px;margin-top:8px;">
      <a href="trang-chu.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/6F6B62/home.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#6f6b62;">Trang chủ</span></a>
      <a href="danh-sach-cast.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/6F6B62/geisha.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#6f6b62;">Cast</span></a>
      <a href="uu-dai.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/6F6B62/gift.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#6f6b62;">Ưu đãi</span></a>
      <a href="lich-su-dat-cho.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/6F6B62/calendar.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#6f6b62;">Đặt chỗ</span></a>
      <a href="tai-khoan.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/D4B26A/user.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#d4b26a;font-weight:600;">Tài khoản</span></a>
    </div>
  </div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {};
  renderVals(){
    var NL = window.NL, a = NL.ACCOUNT;
    var menu = [
      { title:'Đặt chỗ của tôi', sub:'Lịch sử & trạng thái', href:'lich-su-dat-cho.html', icon:'https://img.icons8.com/ios/100/D4B26A/planner.png' },
      { title:'Ví ưu đãi', sub:'Mã giảm giá đang giữ', href:'vi-uu-dai.html', icon:'https://img.icons8.com/ios/100/D4B26A/gift.png' },
      { title:'Cast yêu thích', sub:'Cast & quán đã lưu', href:'danh-sach-cast.html', icon:'https://img.icons8.com/ios/100/D4B26A/like.png' },
      { title:'Hóa đơn & điểm', sub:'Gửi hóa đơn để tích điểm', href:'tai-khoan.html', icon:'https://img.icons8.com/ios/100/D4B26A/invoice.png' },
      { title:'Cài đặt', sub:'Thông tin cá nhân, ngôn ngữ', href:'tai-khoan.html', icon:'https://img.icons8.com/ios/100/D4B26A/settings.png' }
    ];
    return { name:a.name, phone:a.phone, tier:a.tier, points:a.points, nextTier:a.nextTier, need:a.need, menu:menu };
  }
}
</script>
</body>
</html>
