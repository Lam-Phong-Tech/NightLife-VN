<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../shared.js"></script>
<script src="../../support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0e0d12;}
  a{text-decoration:none;color:inherit;}
  .btn{cursor:pointer;transition:filter .14s;}
  .btn:active{filter:brightness(.95);}
</style>
</helmet>


  <div style="margin:0 auto;width:100%;max-width:480px;background:#0e0d12;min-height:100vh;display:flex;flex-direction:column;padding-bottom:20px;box-shadow:0 0 20px rgba(0,0,0,.05);color:#f3f0ea;font-family:'Inter',sans-serif;position:relative;">
    
    <div style="background:#15131a;padding:8px 18px 12px;display:flex;align-items:center;justify-content:space-between;"><h2 style="font-size:19px;font-weight:800;">Ưu đãi hot</h2><a href="vi-uu-dai.html" style="font-size:12px;color:#d4b26a;font-weight:600;">Ví của tôi ›</a></div>

    <div style="padding:12px 18px;display:flex;flex-direction:column;gap:11px;">
      <sc-for list="{{ offers }}" as="o" hint-placeholder-count="6">
        <div style="background:#15131a;border-radius:14px;overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,.06);display:flex;">
          <div style="width:96px;flex:none;background:{{ o.img }};position:relative;"><span style="position:absolute;top:8px;left:8px;background:#e3c27e;color:#3a2600;font-size:12px;font-weight:800;border-radius:9px;padding:3px 8px;">{{ o.value }}</span></div>
          <div style="padding:11px 12px;flex:1;"><div style="font-weight:700;font-size:13.5px;">{{ o.title }}</div><div style="font-size:11px;color:#8c8679;margin-top:2px;">{{ o.place }}</div><div style="margin-top:9px;display:flex;align-items:center;justify-content:space-between;"><span style="font-size:10px;color:#e0729e;background:rgba(224,114,158,.14);border-radius:8px;padding:3px 8px;font-weight:600;">{{ o.expiry }}</span><span onClick="{{ o.take }}" class="btn" style="font-size:11.5px;font-weight:700;border-radius:9px;padding:6px 12px;{{ o.btnStyle }}">{{ o.btnLabel }}</span></div></div>
        </div>
      </sc-for>
    </div>

    <div style="position:sticky;bottom:0;z-index:99;margin-top:auto;height:66px;background:rgba(8,8,11,.92);backdrop-filter:blur(10px);border-top:1px solid rgba(212,178,106,.14);display:flex;align-items:center;justify-content:space-around;padding-bottom:6px;">
      <a href="trang-chu.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/6F6B62/home.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#6f6b62;">Trang chủ</span></a>
      <a href="danh-sach-cast.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/6F6B62/geisha.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#6f6b62;">Cast</span></a>
      <a href="uu-dai.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/D4B26A/gift.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#d4b26a;font-weight:600;">Ưu đãi</span></a>
      <a href="lich-su-dat-cho.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/6F6B62/calendar.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#6f6b62;">Đặt chỗ</span></a>
      <a href="tai-khoan.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/6F6B62/user.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#6f6b62;">Tài khoản</span></a>
    </div>
  </div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {};
  renderVals(){
    var NL = window.NL, self = this, st = this.state;
    var taken = st.taken || {};
    var offers = NL.buildOffers().map(function(o,i){
      var t = !!taken[i];
      return {
        title:o.title, place:o.place, value:o.value, expiry:o.expiry, img:o.img,
        btnLabel: t ? 'Đã lưu ✓' : 'Lấy mã',
        btnStyle: t ? 'background:rgba(60,160,110,.15);color:#7fd6a6;' : 'background:#d4b26a;color:#241a0a;',
        take:function(){ var n=Object.assign({},self.state.taken||{}); n[i]=true; self.setState({taken:n}); }
      };
    });
    return { offers:offers };
  }
}
</script>
</body>
</html>
