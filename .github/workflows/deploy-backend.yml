name: Deploy Node.js App

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Tạo file .env từ Github Secret
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE_BACKEND }}
        run: |
          printf '%s\n' "$ENV_FILE_CONTENT" > .env

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile --prod=false || pnpm install --prod=false

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Project
        run: pnpm run build

      - name: Copy files to VPS via rsync
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          HOST: ${{ secrets.VPS_HOST }}
          USER: ${{ secrets.VPS_USERNAME }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts
          rsync -avz --delete --exclude '.git' --exclude '.github' --filter='P .env' --filter='P uploads' --filter='P public/uploads' --exclude 'node_modules' ./ $USER@$HOST:/var/www/api.demonightlight.nentangso.site

      - name: Restart PM2 & Update DB
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/api.demonightlight.nentangso.site
            corepack enable 2>/dev/null || sudo corepack enable 2>/dev/null || true
            pnpm install --prod --no-frozen-lockfile || pnpm install --prod
            npx prisma generate
            npx prisma db push --accept-data-loss
            PORT=3012 pm2 restart app-api.demonightlight.nentangso.site --update-env || PORT=3012 pm2 start pnpm --name "app-api.demonightlight.nentangso.site" -- run start:prod
            pm2 save
            ok=0; for i in $(seq 1 10); do if ss -tlnH 'sport = :3012' 2>/dev/null | grep -q .; then ok=1; break; fi; sleep 2; done; if [ "$ok" != 1 ]; then echo "::error::App khong nghe cong 3012 sau ~20s. Rat co the code dang hardcode cong (vd app.listen(3000)) thay vi dung process.env.PORT."; pm2 logs app-api.demonightlight.nentangso.site --lines 20 --nostream 2>/dev/null; exit 1; fi
