name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

concurrency:
  group: nightlife-vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nightlife
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nightlife"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nightlife?schema=public
      NIGHTLIFE_RUN_DB_E2E: 'true'
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack (pnpm)
        run: corepack enable


      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile --prod=false || pnpm install --prod=false

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Prepare test database
        run: pnpm exec prisma migrate deploy

      - name: Unit Tests
        run: pnpm test

      - name: E2E Tests
        run: pnpm test:e2e

      - name: Build Project
        run: pnpm run build

      - name: Copy files to VPS via rsync
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          HOST: ${{ secrets.VPS_HOST }}
          USER: ${{ secrets.VPS_USERNAME }}
          VPS_PORT: ${{ secrets.VPS_SSH_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          if [ -z "${SSH_KEY:-}" ] || [ -z "${HOST:-}" ] || [ -z "${USER:-}" ]; then
            echo "::error::Thieu VPS_SSH_KEY, VPS_HOST hoac VPS_USERNAME secret."
            exit 1
          fi
          printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          SSH_HOST="${HOST#ssh://}"
          SSH_HOST="${SSH_HOST#http://}"
          SSH_HOST="${SSH_HOST#https://}"
          SSH_HOST="${SSH_HOST%%/*}"
          SSH_PORT="${VPS_PORT:-22}"
          if [ -z "${VPS_PORT:-}" ] && echo "$SSH_HOST" | grep -Eq '^[^:]+:[0-9]+$'; then
            SSH_PORT="${SSH_HOST##*:}"
            SSH_HOST="${SSH_HOST%:*}"
          fi
          KNOWN_HOSTS="$HOME/.ssh/known_hosts"
          ssh-keyscan -T 30 -p "$SSH_PORT" -H "$SSH_HOST" >> "$KNOWN_HOSTS" || echo "::warning::ssh-keyscan khong lay duoc host key, tiep tuc voi StrictHostKeyChecking=accept-new."
          SSH_CMD="ssh -i $HOME/.ssh/id_rsa -p $SSH_PORT -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=$KNOWN_HOSTS -o ConnectTimeout=30 -o ServerAliveInterval=15"
          $SSH_CMD "$USER@$SSH_HOST" "mkdir -p /var/www/api.demonightlight.test9.io.vn"
          rsync -avz --delete -e "$SSH_CMD" --exclude '.git' --exclude '.github' --filter='P .env' --filter='P uploads' --filter='P public/uploads' --exclude 'node_modules' ./ "$USER@$SSH_HOST:/var/www/api.demonightlight.test9.io.vn"

      - name: Restart PM2 & Update DB
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/api.demonightlight.test9.io.vn
            corepack enable 2>/dev/null || sudo corepack enable 2>/dev/null || true
            pnpm install --prod --no-frozen-lockfile || pnpm install --prod
            npx prisma generate
            npx prisma db push --accept-data-loss
            export PORT=3012
            pm2 restart app-api.demonightlight.test9.io.vn --update-env 2>/dev/null || pm2 start dist/src/main.js --name "app-api.demonightlight.test9.io.vn" --update-env
            pm2 save
            ok=0; for i in $(seq 1 20); do if curl -fsS http://127.0.0.1:3012/areas >/dev/null; then ok=1; break; fi; sleep 2; done; if [ "$ok" != 1 ]; then echo "::error::Backend API khong tra loi /areas tren cong 3012 sau ~40s."; pm2 logs app-api.demonightlight.test9.io.vn --lines 80 --nostream 2>/dev/null; exit 1; fi
            booking_status=000; for i in $(seq 1 10); do booking_status=$(curl -sS -o /tmp/nightlife-backend-booking-check.json -w "%{http_code}" -X POST http://127.0.0.1:3012/bookings -H 'Content-Type: application/json' -d '{}' || true); if [ "$booking_status" = "400" ]; then break; fi; sleep 2; done; if [ "$booking_status" != "400" ]; then echo "::error::Backend POST /bookings chua tra validation 400. Status: $booking_status"; cat /tmp/nightlife-backend-booking-check.json 2>/dev/null || true; pm2 logs app-api.demonightlight.test9.io.vn --lines 80 --nostream 2>/dev/null; exit 1; fi
