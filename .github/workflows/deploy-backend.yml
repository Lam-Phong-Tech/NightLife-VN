name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

concurrency:
  group: nightlife-vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nightlife
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nightlife"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nightlife?schema=public
      NIGHTLIFE_RUN_DB_E2E: 'true'
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack (pnpm)
        run: corepack enable


      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile --prod=false || pnpm install --prod=false

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Prepare test database
        run: pnpm exec prisma migrate deploy

      - name: Unit Tests
        run: pnpm test

      - name: E2E Tests
        run: pnpm test:e2e

      - name: Build Project
        run: pnpm run build

      - name: Copy files to VPS via rsync
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          HOST: ${{ secrets.VPS_HOST }}
          USER: ${{ secrets.VPS_USERNAME }}
          VPS_PORT: ${{ secrets.VPS_SSH_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          if [ -z "${SSH_KEY:-}" ] || [ -z "${HOST:-}" ] || [ -z "${USER:-}" ]; then
            echo "::error::Thieu VPS_SSH_KEY, VPS_HOST hoac VPS_USERNAME secret."
            exit 1
          fi
          printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          SSH_HOST="${HOST#ssh://}"
          SSH_HOST="${SSH_HOST#http://}"
          SSH_HOST="${SSH_HOST#https://}"
          SSH_HOST="${SSH_HOST%%/*}"
          SSH_PORT="${VPS_PORT:-22}"
          if [ -z "${VPS_PORT:-}" ] && echo "$SSH_HOST" | grep -Eq '^[^:]+:[0-9]+$'; then
            SSH_PORT="${SSH_HOST##*:}"
            SSH_HOST="${SSH_HOST%:*}"
          fi
          KNOWN_HOSTS="$HOME/.ssh/known_hosts"
          ssh-keyscan -T 30 -p "$SSH_PORT" -H "$SSH_HOST" >> "$KNOWN_HOSTS" || echo "::warning::ssh-keyscan khong lay duoc host key, tiep tuc voi StrictHostKeyChecking=accept-new."
          SSH_CMD="ssh -i $HOME/.ssh/id_rsa -p $SSH_PORT -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=$KNOWN_HOSTS -o ConnectTimeout=30 -o ServerAliveInterval=15"
          DEPLOY_DIR="/var/www/api.demonightlight.test9.io.vn"
          SNAPSHOT_ROOT="/var/www/releases/api.demonightlight.test9.io.vn"
          SNAPSHOT_STAMP="$(TZ=Asia/Bangkok date +%Y%m%d-%H%M%S)"
          $SSH_CMD "$USER@$SSH_HOST" "set -e; mkdir -p '$DEPLOY_DIR' '$SNAPSHOT_ROOT'; if [ -d '$DEPLOY_DIR' ] && [ -n \"\$(find '$DEPLOY_DIR' -mindepth 1 -maxdepth 1 2>/dev/null | head -n 1)\" ]; then snapshot='$SNAPSHOT_ROOT/backend-$SNAPSHOT_STAMP.tgz'; tar -czf \"\$snapshot\" --exclude='./node_modules' --exclude='./.git' -C '$DEPLOY_DIR' .; echo \"\$snapshot\" > '$SNAPSHOT_ROOT/latest-backend-snapshot.txt'; echo \"Created backend deploy snapshot: \$snapshot\"; else echo 'No previous backend deployment to snapshot.'; fi"
          rsync -avz --delete -e "$SSH_CMD" --exclude '.git' --exclude '.github' --filter='P .env' --filter='P uploads' --filter='P public/uploads' --exclude 'node_modules' ./ "$USER@$SSH_HOST:$DEPLOY_DIR"

      - name: Backup, Migrate, Restart PM2 & Smoke
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            DEPLOY_STAMP="$(TZ=Asia/Bangkok date +%Y%m%d-%H%M%S)"
            BACKEND_DIR="/var/www/api.demonightlight.test9.io.vn"
            FRONTEND_DIR="/var/www/demonightlight.test9.io.vn"
            SNAPSHOT_ROOT="/var/www/releases/api.demonightlight.test9.io.vn"
            BACKUP_ROOT="${BACKUP_ROOT:-/var/backups/nightlife/demo-uat}"
            BACKUP_STORAGE_PATHS="${BACKUP_STORAGE_PATHS:-uploads public/uploads}"
            PUBLIC_FRONTEND_URL="${PUBLIC_FRONTEND_URL:-https://demonightlight.test9.io.vn}"
            PUBLIC_BACKEND_URL="${PUBLIC_BACKEND_URL:-https://api.demonightlight.test9.io.vn}"
            BACKEND_PM2_NAME="app-api.demonightlight.test9.io.vn"
            BACKEND_PORT="3012"
            FRONTEND_PORT="3009"
            EVIDENCE_DIR="$BACKEND_DIR/deploy-evidence"
            SMOKE_RESULTS="/tmp/nightlife-smoke-$DEPLOY_STAMP.txt"
            : > "$SMOKE_RESULTS"

            check_url() {
              check_name="$1"
              check_url="$2"
              check_code="000"
              check_output="/tmp/nightlife-${check_name}-$DEPLOY_STAMP.out"
              for i in $(seq 1 20); do
                check_code="$(curl -k -L -sS -o "$check_output" -w "%{http_code}" "$check_url" || true)"
                case "$check_code" in
                  2*|3*)
                    echo "$check_name=$check_code $check_url" | tee -a "$SMOKE_RESULTS"
                    return 0
                    ;;
                esac
                sleep 2
              done
              echo "::error::$check_name health check failed. URL: $check_url Status: $check_code"
              cat "$check_output" 2>/dev/null || true
              return 1
            }

            cd "$BACKEND_DIR"
            read_env_var() {
              env_key="$1"
              env_file="${2:-.env}"
              awk -v key="$env_key" '
                /^[[:space:]]*(#|$)/ { next }
                {
                  line=$0
                  sub(/\r$/, "", line)
                  sub(/^[[:space:]]*export[[:space:]]+/, "", line)
                  pattern="^[[:space:]]*" key "[[:space:]]*="
                  if (line ~ pattern) {
                    sub(pattern, "", line)
                    sub(/^[[:space:]]+/, "", line)
                    sub(/[[:space:]]+$/, "", line)
                    quote=sprintf("%c", 39)
                    if (substr(line, 1, 1) != "\"" && substr(line, 1, 1) != quote) {
                      sub(/[[:space:]]+#.*$/, "", line)
                    }
                    if ((substr(line, 1, 1) == "\"" && substr(line, length(line), 1) == "\"") || (substr(line, 1, 1) == quote && substr(line, length(line), 1) == quote)) {
                      line=substr(line, 2, length(line) - 2)
                    }
                    print line
                    found=1
                    exit
                  }
                }
                END { if (!found) exit 1 }
              ' "$env_file"
            }

            if [ -f .env ]; then
              DATABASE_URL="$(read_env_var DATABASE_URL .env || true)"
              export DATABASE_URL
            fi
            if [ -z "${DATABASE_URL:-}" ]; then
              echo "::error::DATABASE_URL is required in $BACKEND_DIR/.env before backup and migration."
              exit 1
            fi

            mkdir -p "$EVIDENCE_DIR" "$BACKUP_ROOT"
            corepack enable 2>/dev/null || sudo corepack enable 2>/dev/null || true
            pnpm install --prod --no-frozen-lockfile || pnpm install --prod
            pnpm exec prisma generate

            chmod +x scripts/backup-uat.sh
            CREATE_DATABASE_IF_MISSING=true BACKUP_ROOT="$BACKUP_ROOT" STORAGE_PATHS="$BACKUP_STORAGE_PATHS" scripts/backup-uat.sh
            LATEST_MANIFEST="$(ls -t "$BACKUP_ROOT"/nightlife-*-manifest.txt | head -n 1)"
            LATEST_STAMP="$(basename "$LATEST_MANIFEST" | sed -E 's/^nightlife-([0-9]{8}-[0-9]{6})-manifest\.txt$/\1/')"
            LATEST_CHECKSUMS="$BACKUP_ROOT/nightlife-$LATEST_STAMP-sha256.txt"
            LATEST_DB_DUMP="$BACKUP_ROOT/nightlife-db-$LATEST_STAMP.dump"
            LATEST_DB_LIST="$LATEST_DB_DUMP.list"
            LATEST_STORAGE_ARCHIVE="$BACKUP_ROOT/nightlife-storage-$LATEST_STAMP.tgz"
            LATEST_STORAGE_SKIPPED="$BACKUP_ROOT/nightlife-storage-$LATEST_STAMP.skipped"
            test -s "$LATEST_MANIFEST"
            test -s "$LATEST_CHECKSUMS"
            test -s "$LATEST_DB_DUMP"
            test -s "$LATEST_DB_LIST"

            echo "::group::NightLife backup evidence"
            echo "Backup manifest: $LATEST_MANIFEST"
            cat "$LATEST_MANIFEST"
            echo "Backup checksums: $LATEST_CHECKSUMS"
            cat "$LATEST_CHECKSUMS"
            echo "DB dump size:"
            ls -lh "$LATEST_DB_DUMP"
            echo "pg_restore --list output:"
            sed -n '1,120p' "$LATEST_DB_LIST"
            if [ -s "$LATEST_STORAGE_ARCHIVE" ]; then
              echo "Storage archive size:"
              ls -lh "$LATEST_STORAGE_ARCHIVE"
            else
              echo "Storage archive skipped:"
              cat "$LATEST_STORAGE_SKIPPED"
            fi
            echo "::endgroup::"

            pnpm exec prisma migrate deploy
            export PORT="$BACKEND_PORT"
            pm2 restart "$BACKEND_PM2_NAME" --update-env 2>/dev/null || pm2 start dist/src/main.js --name "$BACKEND_PM2_NAME" --update-env
            pm2 save
            check_url backend_areas_local "http://127.0.0.1:$BACKEND_PORT/areas"
            check_url backend_areas_public "$PUBLIC_BACKEND_URL/areas"

            booking_status=000; for i in $(seq 1 10); do booking_status=$(curl -sS -o /tmp/nightlife-backend-booking-check.json -w "%{http_code}" -X POST "http://127.0.0.1:$BACKEND_PORT/bookings" -H 'Content-Type: application/json' -d '{}' || true); if [ "$booking_status" = "400" ]; then break; fi; sleep 2; done; if [ "$booking_status" != "400" ]; then echo "::error::Backend POST /bookings chua tra validation 400. Status: $booking_status"; cat /tmp/nightlife-backend-booking-check.json 2>/dev/null || true; pm2 logs "$BACKEND_PM2_NAME" --lines 80 --nostream 2>/dev/null; exit 1; fi
            echo "backend_booking_validation=400 http://127.0.0.1:$BACKEND_PORT/bookings" | tee -a "$SMOKE_RESULTS"

            if [ -d "$FRONTEND_DIR" ]; then
              check_url frontend_home_local "http://127.0.0.1:$FRONTEND_PORT/"
              check_url frontend_admin_local "http://127.0.0.1:$FRONTEND_PORT/admin"
              check_url frontend_partner_local "http://127.0.0.1:$FRONTEND_PORT/partner"
              check_url frontend_home_public "$PUBLIC_FRONTEND_URL/"
              check_url frontend_admin_public "$PUBLIC_FRONTEND_URL/admin"
              check_url frontend_partner_public "$PUBLIC_FRONTEND_URL/partner"
            else
              echo "frontend_health=skipped missing $FRONTEND_DIR" | tee -a "$SMOKE_RESULTS"
            fi

            RELEASE_NOTE="$EVIDENCE_DIR/nightlife-$DEPLOY_STAMP-release.txt"
            LATEST_BACKEND_SNAPSHOT="$(cat "$SNAPSHOT_ROOT/latest-backend-snapshot.txt" 2>/dev/null || true)"
            {
              echo "nightlife_release_timestamp=$DEPLOY_STAMP"
              echo "commit_sha=${{ github.sha }}"
              echo "env_profile=demo-uat"
              echo "frontend_url=$PUBLIC_FRONTEND_URL"
              echo "backend_url=$PUBLIC_BACKEND_URL"
              echo "backend_path=$BACKEND_DIR"
              echo "frontend_path=$FRONTEND_DIR"
              echo "backend_port=$BACKEND_PORT"
              echo "frontend_port=$FRONTEND_PORT"
              echo "backend_pm2=$BACKEND_PM2_NAME"
              echo "backup_root=$BACKUP_ROOT"
              echo "backup_manifest=$LATEST_MANIFEST"
              echo "backup_checksum=$LATEST_CHECKSUMS"
              echo "backup_db_dump=$LATEST_DB_DUMP"
              echo "backup_restore_list=$LATEST_DB_LIST"
              if [ -s "$LATEST_STORAGE_ARCHIVE" ]; then
                echo "backup_storage=$LATEST_STORAGE_ARCHIVE"
              else
                echo "backup_storage=$LATEST_STORAGE_SKIPPED"
              fi
              echo "backend_snapshot=${LATEST_BACKEND_SNAPSHOT:-none}"
              echo "rollback_backend=tar -xzf ${LATEST_BACKEND_SNAPSHOT:-<snapshot.tgz>} -C $BACKEND_DIR && cd $BACKEND_DIR && pnpm install --prod --no-frozen-lockfile && PORT=$BACKEND_PORT pm2 restart $BACKEND_PM2_NAME --update-env"
              echo "rollback_database=pg_restore --clean --if-exists --no-owner --no-privileges --dbname <postgres-url-without-prisma-query-params> $LATEST_DB_DUMP"
              echo "smoke_results:"
              cat "$SMOKE_RESULTS"
            } > "$RELEASE_NOTE"

            echo "::group::NightLife deploy release evidence"
            cat "$RELEASE_NOTE"
            echo "::endgroup::"
