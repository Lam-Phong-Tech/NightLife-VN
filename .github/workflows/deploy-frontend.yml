name: Deploy Frontend

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack (pnpm)
        run: corepack enable


      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile --prod=false || pnpm install --prod=false

      - name: Build Project
        run: pnpm run build

      - name: Copy files to VPS via rsync
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          HOST: ${{ secrets.VPS_HOST }}
          USER: ${{ secrets.VPS_USERNAME }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts
          rsync -avz --delete --exclude '.git' --exclude '.github' --filter='P .env' --filter='P uploads' --filter='P public/uploads' --exclude 'node_modules' ./ $USER@$HOST:/var/www/demonightlight.test9.io.vn

      - name: Restart PM2 & Update DB
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/demonightlight.test9.io.vn
            corepack enable 2>/dev/null || sudo corepack enable 2>/dev/null || true
            pnpm install --prod --no-frozen-lockfile || pnpm install --prod
            detect_backend_url() {
              for candidate in http://127.0.0.1:3012 http://localhost:3012 http://127.0.0.1:3000 http://localhost:3000; do
                if curl -fsS "$candidate/areas" >/dev/null; then
                  echo "$candidate"
                  return 0
                fi
              done
              return 1
            }

            BACKEND_URL="$(detect_backend_url || true)"
            if [ -z "$BACKEND_URL" ]; then
              echo "::warning::Khong tim thay backend local dang song. Thu khoi dong lai backend PM2 tu ban deploy hien co."
              if [ -f /var/www/api.demonightlight.test9.io.vn/dist/src/main.js ]; then
                cd /var/www/api.demonightlight.test9.io.vn
                corepack enable 2>/dev/null || sudo corepack enable 2>/dev/null || true
                pnpm install --prod --no-frozen-lockfile || pnpm install --prod
                npx prisma generate
                pm2 delete app-api.demonightlight.test9.io.vn 2>/dev/null || true
                pm2 delete app-api.demonightlight.test9io.vn 2>/dev/null || true
                fuser -k 3012/tcp 2>/dev/null || true
                PORT=3012 pm2 start dist/src/main.js --name "app-api.demonightlight.test9io.vn" --update-env
                cd /var/www/demonightlight.test9.io.vn
              else
                echo "::error::Khong tim thay backend dist/src/main.js tren VPS de tu khoi dong lai."
                exit 1
              fi
            fi

            BACKEND_URL=""; for i in $(seq 1 30); do BACKEND_URL="$(detect_backend_url || true)"; if [ -n "$BACKEND_URL" ]; then break; fi; sleep 2; done; if [ -z "$BACKEND_URL" ]; then echo "::error::Backend khong tra loi /areas tren cac cong local sau khi deploy frontend."; pm2 logs app-api.demonightlight.test9io.vn --lines 80 --nostream 2>/dev/null; exit 1; fi
            pm2 delete app-demonightlight.test9.io.vn 2>/dev/null || true
            pm2 delete app-demonightlight.test9io.vn 2>/dev/null || true
            fuser -k 3009/tcp 2>/dev/null || true; sleep 1; fuser -k -9 3009/tcp 2>/dev/null || true; sleep 2
            BACKEND_API_URL="$BACKEND_URL" BACKEND_API_FALLBACK_URLS="http://127.0.0.1:3012,http://localhost:3012,http://127.0.0.1:3000,http://localhost:3000" PORT=3009 pm2 start pnpm --name "app-demonightlight.test9io.vn" -- --dir apps/web run start
            pm2 save
            ok=0; for i in $(seq 1 20); do if curl -fsS http://127.0.0.1:3009/dat-cho >/dev/null; then ok=1; break; fi; sleep 2; done; if [ "$ok" != 1 ]; then echo "::error::Frontend khong tra loi /dat-cho tren cong 3009 sau ~40s."; pm2 logs app-demonightlight.test9io.vn --lines 80 --nostream 2>/dev/null; exit 1; fi
            if ! curl -fsS http://127.0.0.1:3009/api/backend/areas >/dev/null; then echo "::error::Frontend da len, nhung proxy /api/backend/areas khong noi duoc backend 3012."; pm2 logs app-demonightlight.test9io.vn --lines 80 --nostream 2>/dev/null; pm2 logs app-api.demonightlight.test9io.vn --lines 80 --nostream 2>/dev/null; exit 1; fi
            booking_status=000; for i in $(seq 1 10); do booking_status=$(curl -sS -o /tmp/nightlife-frontend-booking-check.json -w "%{http_code}" -X POST http://127.0.0.1:3009/api/backend/bookings -H 'Content-Type: application/json' -d '{}' || true); if [ "$booking_status" = "400" ]; then break; fi; sleep 2; done; if [ "$booking_status" != "400" ]; then echo "::error::Frontend proxy POST /api/backend/bookings chua noi duoc backend booking validation. Status: $booking_status"; cat /tmp/nightlife-frontend-booking-check.json 2>/dev/null || true; pm2 logs app-demonightlight.test9io.vn --lines 80 --nostream 2>/dev/null; pm2 logs app-api.demonightlight.test9io.vn --lines 80 --nostream 2>/dev/null; exit 1; fi
