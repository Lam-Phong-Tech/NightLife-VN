name: Deploy Node.js App

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack (pnpm)
        run: corepack enable


      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile --prod=false || pnpm install --prod=false

      - name: Build Project
        run: pnpm run build

      - name: Copy files to VPS via rsync
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          HOST: ${{ secrets.VPS_HOST }}
          USER: ${{ secrets.VPS_USERNAME }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts
          rsync -avz --delete --exclude '.git' --exclude '.github' --filter='P .env' --filter='P uploads' --filter='P public/uploads' --exclude 'node_modules' ./ $USER@$HOST:/var/www/demonightlight.test9.io.vn

      - name: Restart PM2 & Update DB
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/demonightlight.test9.io.vn
            corepack enable 2>/dev/null || sudo corepack enable 2>/dev/null || true
            pnpm install --prod --no-frozen-lockfile || pnpm install --prod
            pm2 delete app-demonightlight.test9.io.vn 2>/dev/null || true
            pm2 delete app-demonightlight.test9io.vn 2>/dev/null || true
            fuser -k 3009/tcp 2>/dev/null || true
            BACKEND_API_URL=http://127.0.0.1:3001 PORT=3009 pm2 start pnpm --name "app-demonightlight.test9io.vn" -- --dir apps/web run start
            pm2 save
            ok=0; for i in $(seq 1 20); do if curl -fsS http://127.0.0.1:3009/dat-cho >/dev/null; then ok=1; break; fi; sleep 2; done; if [ "$ok" != 1 ]; then echo "::error::Frontend khong tra loi /dat-cho tren cong 3009 sau ~40s."; pm2 logs app-demonightlight.test9io.vn --lines 80 --nostream 2>/dev/null; exit 1; fi
            if ! curl -fsS http://127.0.0.1:3009/api/backend/areas >/dev/null; then echo "::warning::Frontend da len, nhung proxy /api/backend/areas chua noi duoc backend 3001 luc deploy frontend. Backend workflow se check API rieng."; fi
