name: Deploy Frontend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

concurrency:
  group: nightlife-vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack (pnpm)
        run: corepack enable


      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile --prod=false || pnpm install --prod=false

      - name: Build Project
        run: pnpm run build

      - name: Copy files to VPS via rsync
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          HOST: ${{ secrets.VPS_HOST }}
          USER: ${{ secrets.VPS_USERNAME }}
          VPS_PORT: ${{ secrets.VPS_SSH_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          if [ -z "${SSH_KEY:-}" ] || [ -z "${HOST:-}" ] || [ -z "${USER:-}" ]; then
            echo "::error::Thieu VPS_SSH_KEY, VPS_HOST hoac VPS_USERNAME secret."
            exit 1
          fi
          printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          SSH_HOST="${HOST#ssh://}"
          SSH_HOST="${SSH_HOST#http://}"
          SSH_HOST="${SSH_HOST#https://}"
          SSH_HOST="${SSH_HOST%%/*}"
          SSH_PORT="${VPS_PORT:-22}"
          if [ -z "${VPS_PORT:-}" ] && echo "$SSH_HOST" | grep -Eq '^[^:]+:[0-9]+$'; then
            SSH_PORT="${SSH_HOST##*:}"
            SSH_HOST="${SSH_HOST%:*}"
          fi
          KNOWN_HOSTS="$HOME/.ssh/known_hosts"
          touch "$KNOWN_HOSTS"
          KEYSCAN_LOG="$(mktemp)"
          set +e
          timeout 25s ssh-keyscan -T 8 -t rsa,ecdsa,ed25519 -p "$SSH_PORT" -H "$SSH_HOST" >> "$KNOWN_HOSTS" 2>"$KEYSCAN_LOG"
          KEYSCAN_STATUS=$?
          set -e
          if [ "$KEYSCAN_STATUS" -ne 0 ]; then
            echo "::warning::ssh-keyscan khong lay duoc day du host key trong 25s, tiep tuc voi StrictHostKeyChecking=accept-new."
            cat "$KEYSCAN_LOG" || true
          fi

          SSH_CMD="ssh -i $HOME/.ssh/id_rsa -p $SSH_PORT -o BatchMode=yes -o PreferredAuthentications=publickey -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=$KNOWN_HOSTS -o ConnectTimeout=20 -o ConnectionAttempts=3 -o ServerAliveInterval=10 -o ServerAliveCountMax=6 -o TCPKeepAlive=yes -o IPQoS=none -o LogLevel=ERROR"
          retry_ssh() {
            ssh_status=0
            for attempt in 1 2 3; do
              if $SSH_CMD "$USER@$SSH_HOST" "$@"; then
                return 0
              fi
              ssh_status=$?
              if [ "$attempt" -lt 3 ]; then
                echo "::warning::SSH attempt $attempt/3 failed with exit $ssh_status. Retrying..."
                sleep $((attempt * 10))
              fi
            done
            return "$ssh_status"
          }

          retry_rsync() {
            rsync_status=0
            for attempt in 1 2 3; do
              if rsync -avz --delete --timeout=120 -e "$SSH_CMD" --exclude '.git' --exclude '.github' --filter='P .env' --filter='P uploads' --filter='P public/uploads' --exclude 'node_modules' ./ "$USER@$SSH_HOST:/var/www/demonightlight.test9.io.vn"; then
                return 0
              fi
              rsync_status=$?
              if [ "$attempt" -lt 3 ]; then
                echo "::warning::rsync attempt $attempt/3 failed with exit $rsync_status. Retrying..."
                sleep $((attempt * 10))
              fi
            done
            return "$rsync_status"
          }

          retry_ssh "mkdir -p /var/www/demonightlight.test9.io.vn"
          retry_rsync

      - name: Restart PM2 & Update DB
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/demonightlight.test9.io.vn
            corepack enable 2>/dev/null || sudo corepack enable 2>/dev/null || true
            pnpm install --prod --no-frozen-lockfile || pnpm install --prod
            export BACKEND_API_URL="http://127.0.0.1:3012"
            export BACKEND_API_FALLBACK_URLS="http://127.0.0.1:3012,http://localhost:3012,http://127.0.0.1:3000,http://localhost:3000"
            export PORT=3009

            pm2 restart app-demonightlight.test9.io.vn --update-env 2>/dev/null || pm2 start pnpm --name "app-demonightlight.test9.io.vn" -- --dir apps/web run start
            pm2 save

            ok=0; for i in $(seq 1 20); do if curl -fsS http://127.0.0.1:3009/dat-cho >/dev/null; then ok=1; break; fi; sleep 2; done; if [ "$ok" != 1 ]; then echo "::error::Frontend khong tra loi /dat-cho tren cong 3009 sau ~40s."; pm2 logs app-demonightlight.test9.io.vn --lines 80 --nostream 2>/dev/null; exit 1; fi
            if ! curl -fsS http://127.0.0.1:3009/line-email-consent >/dev/null; then echo "::error::Frontend da len, nhung trang LINE email consent chua san sang."; pm2 logs app-demonightlight.test9.io.vn --lines 80 --nostream 2>/dev/null; exit 1; fi
            if ! curl -fsS http://127.0.0.1:3009/api/backend/areas >/dev/null; then echo "::error::Frontend da len, nhung proxy /api/backend/areas khong noi duoc backend 3012."; pm2 logs app-demonightlight.test9.io.vn --lines 80 --nostream 2>/dev/null; pm2 logs app-api.demonightlight.test9.io.vn --lines 80 --nostream 2>/dev/null; exit 1; fi
            booking_status=000; for i in $(seq 1 10); do booking_status=$(curl -sS -o /tmp/nightlife-frontend-booking-check.json -w "%{http_code}" -X POST http://127.0.0.1:3009/api/backend/bookings -H 'Content-Type: application/json' -d '{}' || true); if [ "$booking_status" = "400" ]; then break; fi; sleep 2; done; if [ "$booking_status" != "400" ]; then echo "::error::Frontend proxy POST /api/backend/bookings chua noi duoc backend booking validation. Status: $booking_status"; cat /tmp/nightlife-frontend-booking-check.json 2>/dev/null || true; pm2 logs app-demonightlight.test9.io.vn --lines 80 --nostream 2>/dev/null; pm2 logs app-api.demonightlight.test9.io.vn --lines 80 --nostream 2>/dev/null; exit 1; fi
